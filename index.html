<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscar Banners</title>
  <link rel="icon" type="image/png" href="/buscar.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <link href="https://cdn.boxicons.com/fonts/basic/boxicons.min.css" rel="stylesheet">
  <link href="https://cdn.boxicons.com/fonts/transformations.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }
    .suggestion-box {
      position: absolute;
      z-index: 999;
      background-color: #212529; /* dark */
      color: #f8f9fa; /* light */
      border: 1px solid #444;
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      border-radius: 0.375rem;
    }

    .suggestion-item {
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .card-dark {
      background-color: #343a40;
      color: white;
      border: 1px solid #444;
    }

    .form-control, .form-select, textarea {
      background-color: #212529;
      color: white;
      border: 1px solid #444;
    }

    .form-control::placeholder {
      color: #aaa;
    }

    textarea:read-only {
      background-color: #1e1e1e;
    }

    .card-dark {
  background-color: #343a40;
  color: white;
  border: 1px solid #444;
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.05);
}

.form-select:focus {
  border-color: #66afe9;
  box-shadow: 0 0 0 0.2rem rgba(102, 175, 233, 0.25);
}
.form-control::placeholder {
  color: #cccccc;
  font-style: italic;
}


.btn.btn-dark:hover {
  background-color: #2b2b2b;
  color: #fff;
}






.glass-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      padding: 2rem;
    }

    .glass-input {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
    }

    .glass-input::placeholder {
      color: #ccc;
    }

    .glass-badge {
      background: rgba(255, 193, 7, 0.25);
      border: 1px solid rgba(255, 193, 7, 0.4);
      color: #ffc107;
      transition: all 0.3s ease;
    }

    .glass-badge.animate {
      animation: bounceIn 0.6s;
    }


    .bg-success-custom {
  background-color: #00C896 !important;
  color: white;
}

.bg-warning-custom {
  background-color: #FFB347 !important;
  color: black;
}

.bg-danger-custom {
  background-color: #EF4444 !important;
  color: white;
}

.bg-info-custom {
  background-color: #3B82F6 !important;
  color: white;
}

.bg-purple-toast {
  background-color: #7C3AED !important;
  color: white;
}

#loaderOverlay {
  transition: opacity 0.4s ease;
}

.loader-spinner {
  width: 48px;
  height: 48px;
  border: 5px solid rgba(255, 255, 255, 0.15);
  border-top: 5px solid #00C896;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}




  </style>
</head>
<body class="bg-dark text-light">

<!-- 🔄 Loader Overlay elegante -->
<div id="loaderOverlay" style="
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: #00C896;
">
  <div class="loader-spinner"></div>
  <div class="mt-3 fw-bold small text-light">Cargando banners...</div>
</div>




  <div class="container  py-5">
    <div class="row glass-card">
<div class="col-10">
    <h1 class="mb-4">🔍 Buscar Banner y Generar HTML </h1>
  </div>
    <div class="col-2">
    <button onclick="limpiarCamposBanner()" class="btn btn-outline-light mt-3 mb-3 ms-2 d-flex gap-2">
      <i class="bx bx-brush bx-sm"></i> Limpiar todo
    </button> 
    </div>
  </div>
  <br>
    <div class="row glass-card p-4">


  <div class="col-12">
    <div class="position-relative mb-4">
             <div class="input-group flex-nowrap">
              <span class="input-group-text d-flex gap-1" id="addon-wrapping">
                <i class="bx bx-search-big bx-xs"></i>Buscar Banner</span>

           
              <input type="text" class="form-control" id="buscarBanner" placeholder="Escribe nombre de banner Ej. Banner Cyber..." aria-label="Username" aria-describedby="addon-wrapping" oninput="sugerenciasBannerSimple(this.value); activarBotonLimpiar()"
              onclick="activarBotonLimpiar()">
            </div>
    
      <button id="btnClearInput"
              class="btn btn-sm  position-absolute top-50 end-0  translate-middle-y me-2 d-none"
              onclick="limpiarInputBuscar()" type="button">❌</button>
    
      <div id="sugerencias-banner" class="suggestion-box d-none"></div>
    </div>
    
    <div class="col-4">
      <div class="mb-3">
  
  
     
        
        <span id="contadorBanners" class="glass-badge px-3 py-2 rounded-pill">
          0 banners agregados 🎯
        </span>
      </div>
    </div>

  </div>

  
   
    <div class="col-8">
    <div class="card card-dark">
      <div class="card-body">
        <h5 class="card-title d-flex gap-2"><i class="bx bx-picture-in-picture-close bx-sm"></i> Vista previa</h5>
        <div id="previewHTML" class="bg-dark p-3 rounded shadow-sm border border-light-subtle"></div>
      </div>
    </div>
  </div>

  <div class="col-4 card card-dark">

    <h5 class="card-title mt-3 d-flex gap-2"><i class="bx bx-clipboard-code bx-sm"></i>Código HTML AMPscript:</h5>
    <textarea id="codigoGenerado" class="form-control" rows="8" readonly></textarea>
    <button onclick="copiarCodigo()" class="btn btn-light mt-3 mb-3 d-flex justify-content-center gap-2"><i class="bx bx-copy bx-sm"></i>Copiar HTML</button>

  </div>

  </div>
  </div>



<!-- Toast container -->




<!-- Modal Editar -->
<div class="modal fade" id="modalEditarBanner" tabindex="-1" aria-labelledby="modalEditarBannerLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light border border-secondary shadow-lg">
      <div class="modal-header">
        <h5 class="modal-title align-items-center d-flex gap-2" id="modalEditarBannerLabel"> <i class="bx bx-edit-alt bx-sm"></i> Editar Banner</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="bannerIndex">
        <div class="mb-3">
          <label for="editHref" class="form-label">URL del enlace</label>
          <input type="text" class="form-control" id="editHref" autocomplete="off">
        </div>
        <div class="mb-3">
          <label for="editImg" class="form-label">URL de la imagen</label>
          <input type="text" class="form-control" id="editImg" autocomplete="off">
        </div>
        <div class="mb-3">
          <label for="editAlt" class="form-label">Texto ALT</label>
          <input type="text" class="form-control" id="editAlt" autocomplete="off">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" onclick="guardarCambiosBanner()">Guardar</button>
      </div>
    </div>
  </div>
</div>


<!-- Contenedor de toasts con z-index mayor a Bootstrap modal -->
<div id="toastContainer" class="position-fixed bottom-0 end-0 p-3" style="z-index: 2000 !important;"></div>

<footer class="py-4 border-top mt-5">
  <div class="container">
    <div class="row align-items-center text-center text-md-start">
      <div class="col-md-8 mb-3 mb-md-0">
        <p class="mb-0">
          Creado por <strong>Gustavo</strong> | Creador de<strong> Buscador</strong> de Banners para 
          <a href="https://www.sodimac.cl" class="text-decoration-none link-primary" target="_blank">Sodimac</a>
        </p>
      </div>
      <div class="col-md-4 text-md-end">
        <div class="d-flex justify-content-center justify-content-md-end gap-3">
          <a href="https://www.facebook.com" target="_blank" class="text-reset"><i class="bi bi-facebook fs-5"></i></a>
          <a href="https://www.linkedin.com" target="_blank" class="text-reset"><i class="bi bi-linkedin fs-5"></i></a>
          <a href="https://github.com" target="_blank" class="text-reset"><i class="bi bi-github fs-5"></i></a>
        </div>
        <small class="d-block mt-2">&copy; <span id="anioActual"></span> Todos los derechos reservados</small>
      </div>
    </div>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


  <script src="script.js"></script>

  <!-- CDN de loaders UIball -->
<script src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/auto.min.js"></script>
</body>
</html>
